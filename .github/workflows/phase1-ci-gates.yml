name: Phase1 CI Gates

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  pr-policy:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title includes Phase1 task reference
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if echo "$PR_TITLE" | grep -Eq 'P1-[0-9]{3}|Phase1|phase1'; then
            echo "PR title policy passed: $PR_TITLE"
          else
            echo "PR title must include a Phase1 marker (e.g. P1-013)."
            echo "Current title: $PR_TITLE"
            exit 1
          fi

      - name: Block draft pull requests
        if: github.event.pull_request.draft == true
        run: |
          echo "Draft pull requests cannot merge while CI gates are enforced."
          exit 1

  verityui-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check gate
        run: npm run lint

      - name: Production build gate
        run: npm run build

  verityui-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Phase 1 smoke scenarios
        run: npm run smoke:test
